{% extends "base.html" %}

{% block title %}{% if object %}Edit{% else %}Upload{% endif %} 3D Model{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px; margin: 40px auto; padding: 0 32px;">
    <h1 style="font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 600;">
        {% if object %}Edit{% else %}Upload{% endif %} 3D Model
    </h1>
    <p style="color: var(--muted); margin-top: 4px;">Fill in the details for the 3D model.</p>

    <form method="post" enctype="multipart/form-data" style="background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 32px; margin-top: 24px;">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 20px;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="nav-login" style="width: 100%; margin-top: 24px;">{% if object %}Save Changes{% else %}Upload Model{% endif %}</button>
    </form>
</div>
{% endblock %}
