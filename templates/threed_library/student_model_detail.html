{% extends "base.html" %}

{% block title %}{{ model.title }} - 3D Library{% endblock %}

{% block extra_head %}
<!-- Imports the <model-viewer> component -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
{% endblock %}

{% block content %}
<style>
    model-viewer {
        width: 100%;
        height: 60vh;
        border-radius: 16px;
        border: 1px solid var(--line);
        background-color: #f8f8f8;
    }
    [data-theme="dark"] model-viewer {
        background-color: var(--paper-2);
    }
</style>

<div class="container" style="max-width: 900px; margin: 40px auto; padding: 0 32px;">
    <div style="margin-bottom: 24px;">
        <a href="{% url 'threed_library:student_list' %}" style="font-size: 14px; color: var(--muted); text-decoration: none;">&larr; Back to Library</a>
        <h1 style="font-family: 'Source Serif 4', serif; font-size: 32px; font-weight: 600; margin-top: 8px;">{{ model.title }}</h1>
        {% if model.description %}
        <p style="color: var(--muted); margin-top: 8px; max-width: 650px;">{{ model.description }}</p>
        {% endif %}
    </div>

    <model-viewer src="{{ model.model_file.url }}" 
                  alt="A 3D model of {{ model.title }}"
                  ar 
                  camera-controls 
                  auto-rotate
                  shadow-intensity="1">
    </model-viewer>
</div>
{% endblock %}
