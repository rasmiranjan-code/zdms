{% extends "base.html" %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 40px auto; padding: 0 32px;">
    <div style="margin-bottom: 24px;">
        <h1 style="font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 600;">
            Confirm Deletion
        </h1>
        <p style="color: var(--muted); margin-top: 4px;">
            Are you sure you want to delete this image from the gallery? This action cannot be undone.
        </p>
    </div>

    <div style="background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="{{ image.image.url }}" alt="Image to delete" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;">
            <p>{{ image.caption|default:"Image" }}</p>
        </div>
        <form method="post" style="margin-top: 20px;">
            {% csrf_token %}
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
                <a href="{% url 'core:gallery_list' %}" class="table-btn" style="text-decoration: none;">Cancel</a>
                <button type="submit" class="nav-login" style="border-radius: 8px; background: var(--danger); border-color: var(--danger);">Confirm Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
