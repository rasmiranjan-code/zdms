{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 40px auto; padding: 0 32px;">
    <h1 style="font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 600; margin-bottom: 24px;">Settings</h1>

    <!-- Profile Settings -->
    <div style="background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 32px; margin-bottom: 24px;">
        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Profile Information</h2>
        <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            {% for field in form %}
            <div style="margin-bottom: 15px;">
                <label for="{{ field.id_for_label }}" style="display: block; margin-bottom: 5px; font-weight: 500;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div style="color: red; font-size: 12px; margin-top: 5px;">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="nav-login" style="width: 100%; padding: 12px; font-size: 16px; margin-top: 12px;">Save Profile</button>
        </form>
    </div>

    <!-- Theme Settings -->
    <div style="background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 32px;">
        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Appearance</h2>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span>Toggle Dark Mode</span>
            <button id="theme-toggle" class="nav-login" style="background-color: var(--paper-3); color: var(--ink);">Toggle Theme</button>
        </div>
    </div>
</div>
{% endblock %}
