{% extends "base.html" %}

{% block title %}Test Result: {{ quiz.title }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px; margin: 60px auto; padding: 0 32px; text-align: center;">
    <div style="background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 40px;">
        <h1 style="font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 600;">Test Submitted!</h1>
        <p style="color: var(--muted); margin-top: 8px;">Here is your result for the test: <strong>{{ quiz.title }}</strong></p>

        <div style="margin: 32px 0;">
            <span style="font-size: 14px; font-weight: 500; color: var(--muted);">You Scored</span>
            <div style="font-family: 'Source Serif 4', serif; font-size: 52px; font-weight: 700; color: var(--primary); line-height: 1.2;">
                {{ attempt.score|floatformat:2 }} <span style="font-size: 24px; color: var(--muted);">/ {{ quiz.total_marks }}</span>
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 16px; margin-top: 32px;">
            <a href="{% url 'quiz:student_quiz_list' %}" class="nav-login" style="background: var(--paper-2); color: var(--ink);">Back to Tests</a>
            <a href="{% url 'students:dashboard' %}" class="nav-login">Go to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
