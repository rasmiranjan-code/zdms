{% extends "base.html" %}
{% block title %}Add MCQ - Select Semester{% endblock %}
{% block content %}
<div class="container" style="max-width: 800px; margin: 40px auto; padding: 0 32px;">
    <h1 style="font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 600;">Select Semester</h1>
    <p style="color: var(--muted); margin-top: 4px;">Choose a semester to add questions for its subjects.</p>
    <div style="margin-top: 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
        {% for semester in semesters %}
            <a href="{% url 'mcqs:faculty_select_subject' semester.id %}" class="portal-card" style="animation: none; opacity: 1;">
                <span class="portal-label">Semester {{ semester.number }}</span>                
            </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
