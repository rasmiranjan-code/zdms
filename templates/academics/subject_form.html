{% extends "base.html" %}

{% block title %}Add Subject{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Add New Subject</h2>
    <p>Create a new subject and assign it to a semester.</p>
    <hr style="margin: 16px 0;">

    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom: 15px;">
            <label for="{{ field.id_for_label }}" style="display: block; margin-bottom: 5px; font-weight: 500;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div style="color: red; font-size: 12px; margin-top: 5px;">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="nav-login" style="width: 100%; padding: 12px; font-size: 16px;">Save Subject</button>
    </form>
</div>
{% endblock %}
