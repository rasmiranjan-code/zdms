{% extends "base.html" %}

{% block title %}HOD Dashboard{% endblock %}

{% block content %}
<div class="container" style="max-width: 1040px; margin: 40px auto; padding: 0 32px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div>
            <h1 style="font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 600;">HOD Dashboard</h1>
            <p style="color: var(--muted); margin-top: 4px;">Welcome back, {{ user.get_full_name|default:user.username }}.</p>
        </div>
        <div>
            <a href="{% url 'accounts:hod_add_student' %}" class="nav-login">Add New Student</a>
        </div>
    </div>

    <div style="background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 32px;">
        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Quick Actions</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
            <!-- Add more dashboard cards here -->
            <a href="#" class="portal-card" style="animation: none; opacity: 1;">Manage Faculty</a>
            <a href="{% url 'students:list' %}" class="portal-card" style="animation: none; opacity: 1;">View All Students</a>
            <a href="{% url 'academics:session_list' %}" class="portal-card" style="animation: none; opacity: 1;">Academic Sessions</a>
        </div>
    </div>
</div>
{% endblock %}
