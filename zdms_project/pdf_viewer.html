{% extends "base.html" %}
{% load static %}

{% block title %}{{ note.title }}{% endblock %}

{% block content %}
<style>
    /* Make the viewer take full height */
    main { padding: 0; margin: 0; height: calc(100vh - 71px); } /* 71px is header height */
    #pdf-viewer { width: 100%; height: 100%; border: none; }
</style>

<iframe id="pdf-viewer" src="{% static 'pdfjs/web/viewer.html' %}?file={{ pdf_url }}" title="{{ note.title }}"></iframe>

<script>
    // Optional: Adjust height if header size changes
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelector('body').style.overflow = 'hidden';
    });
</script>
{% endblock %}
